name: Pre-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prerelease:
    name: Tag and publish GitHub Pre-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute pre-release version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/ute_tarifas/manifest.json'))['version'])")
          # Determine the next RC number for this version to avoid colliding with
          # the final release tag (v$VERSION) created by the publish workflow.
          # Fetch all existing RC tags in one call and find the highest number.
          EXISTING=$(git tag -l "v${VERSION}-rc.*" | grep -oP '(?<=rc\.)\d+' | sort -n | tail -1)
          RC=$(( ${EXISTING:-0} + 1 ))
          TAG="v${VERSION}-rc.${RC}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Pre-release tag: $TAG"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git tag -l "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag $TAG already exists — skipping pre-release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create release zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cd custom_components/ute_tarifas
          zip -r ../../ute_tarifas.zip .

      - name: Create GitHub Pre-release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          prerelease: true
          generate_release_notes: true
          files: ute_tarifas.zip
